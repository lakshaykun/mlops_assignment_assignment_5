name: CI Pipeline

on:
  push_request:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1 Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v3


    # 2 Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"


    # 3 Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt


    # 4 Run tests
    - name: Run pytest
      run: |
        pytest


    # 5 Build Docker Image
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/iris-api:latest .


    # 6 Login to DockerHub
    - name: Login to DockerHub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin


    # 7 Push Docker image
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/iris-api:latest


    # 8 Pull Docker image
    - name: Pull Docker image
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/iris-api:latest


    # 9 Run Docker container
    - name: Run Docker container
      run: |
        docker run -d -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/iris-api:latest